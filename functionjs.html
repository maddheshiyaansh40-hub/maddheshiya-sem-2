 demo();

          // An anonymous function in JavaScript is a function that does not have an identifier (name) associated with it. These functions are primarily used for one-time tasks or scenarios where a function is passed as a value, such as callbacks, event handlers, or Immediately Invoked Function Expressions (IIFE)

let msg=()=>console.log("Hello ABES");

//callback function: A callback function is a function passed as an argument into another function. A callback function is intended to be executed later.

function sub(a,b,callback){
    var num1=a;
    var num2=b;
    var res=num1-num2;
    callback(res);

}
function displayRes(res){
    console.log("Result is " + res);
}
sub(13,5,displayRes);

// IIFE- 
(function(a,b){
    console.log(`First parameter ${a} and 
    Second parameter ${b}`);
    var res=a+b;
    console.log(`Result is ${res}`);
})(4,5);
//short code using arrow function
(msg=>console.log("Hello IIFE"))();

// Promises:-A JavaScript Promise is an object representing the eventual completion (or failure) of an asynchronous operation and its resulting value. It is a core feature in modern JavaScript used to handle operations like fetching data from an API, reading files, or managing time delays in a cleaner, more readable way than traditional callbacks, avoiding "callback hell".

/* A promise exists in one of three mutually exclusive states: 
pending: The initial state; the operation is still in progress.
fulfilled: The operation completed successfully, and a value is available (e.g., the data from an API call).
rejected: The operation failed, and a reason (error) is available. */

let promise=new Promise(function(resolve, reject){
    let age=5;
    if(age>=18){
        resolve("valid age");
    }
    else{
        reject("wait for next year")
    }
});
// console.log(promise);
promise.then(msg=>console.log(msg)).catch(error=>console.log(error));

//Local Storage-JavaScript localStorage is a feature that enables web applications to store simple key-value pairs locally within the user's browser with no expiration date. The data persists even after the browser is closed and reopened, making it useful for saving user preferences, form data, or application state across sessions


let myInfo={
    name:"John",
    age:23,
    mob:6986787689,
    eMail:"john234@gmail.com"
}
//Convert object to string using stringify
let myInfoData=JSON.stringify(myInfo);

//set data
localStorage.setItem('prefrence',myInfoData);

// Retrieving and parsing the object back
let getMyInfoloData=localStorage.getItem('prefrence');

//parse the object
const finalData=JSON.parse(getMyInfoloData);
console.log(finalData.name);

// Higher Order Function:-higher-order functions help make your code more reusable and modular by allowing you to work with functions like any other value.

//map() filter() reduce() forEach()
/* Array.prototype.map(): Creates a new array by applying a function to every element in the original array.
Array.prototype.filter(): Creates a new array with only the elements that satisfy a condition defined by a callback function.
Array.prototype.reduce(): Accumulates an array into a single value (like a sum or product) by repeatedly applying a function to each element and a running total.
Array.prototype.forEach(): Executes a provided function once for each array element, typically for side effects like logging to the console. */

let num=[3,5,6,7,8,9,2,3,5,6,8,0];

// find the squre of num
let result=num.map(n=>n*n);
console.log(`Squre of num is ${result}`);
//find the number greater than 3
let result2=num.filter(n=>n>3);
console.log(`Sorting of num array is ${result2}`);
//find sum of num aaray
let sum=num.reduce((total,n)=>total+n);
console.log(`Additon of num array elements is ${sum}`);
// find multiply of 2 of each elements of num array

num.forEach((n)=>console.log(n*2))
